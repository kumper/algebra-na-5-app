<app-card [levelClass]="levelClass()">
  @if (game.currentQuestion(); as q) {

    <!-- Header: progress + score -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <small class="opacity-75">Pytanie {{ game.questionsAnswered() + 1 }} / 25</small>
      <span class="badge fs-6" [class]="'badge level-badge ' + levelClass()">
        🏆 {{ game.score() }} pkt
      </span>
      <span class="badge border opacity-75">Poziom {{ game.currentDifficulty() }}</span>
    </div>

    <!-- Progress bar -->
    <div class="progress mb-4" style="height: 6px;" role="progressbar"
         [attr.aria-valuenow]="game.progress()"
         aria-valuemin="0" aria-valuemax="100"
         [attr.aria-label]="'Postęp quizu: ' + game.progress() + '%'">
      <div class="progress-bar level-progress" [style.width.%]="game.progress()"></div>
    </div>

    <!-- Question -->
    <div class="text-center mb-4">
      <app-question-display [question]="q.question" />
    </div>

    <!-- Answer buttons — horizontal -->
    <div class="d-flex gap-2 mb-3 flex-wrap justify-content-center">
      @for (answer of q.answers; track answer.id) {
        <button
          type="button"
          class="btn btn-lg answer-btn flex-fill"
          [class.btn-outline-light]="selectedAnswerId() !== answer.id"
          [class.answer-btn--selected]="selectedAnswerId() === answer.id"
          [attr.aria-pressed]="selectedAnswerId() === answer.id"
          (click)="select(answer.id)"
        >
          {{ answer.label }}
        </button>
      }
    </div>

    <!-- Confirm button -->
    <div class="d-grid">
      <button
        type="button"
        class="btn btn-lg level-confirm-btn"
        [disabled]="selectedAnswerId() === null"
        (click)="confirm()"
      >
        Zatwierdź ✔
      </button>
    </div>

  } @else {
    <p class="text-center opacity-75 mb-0">Ładowanie pytania...</p>
  }
</app-card>
